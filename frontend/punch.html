<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Punch Clock | DaDaGym</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/x-icon" href="images/logo.png">

<link rel="stylesheet" href="CSS/punch.css">

</head>
<body class="punch-body">

<div id="punchApp" class="punch-app">

<button type="button" class="btn btn-sm btn-outline-light punch-corner-cam" data-bs-toggle="modal" data-bs-target="#punchAltModal" title="Camera or manual entry" aria-label="Camera or manual entry">

    <i class="fas fa-camera" aria-hidden="true"></i>

</button>

    <header class="punch-header">

        <div class="punch-brand">

            <img src="images/logo.png" alt="DaDaGym">

            <div>

                <h1>DaDaGym</h1>

                <small>Punch clock</small>

            </div>

        </div>

    </header>



    <main class="punch-main">

        <section class="punch-clock-wrap" aria-label="Current time">

            <div class="punch-donut-slot">

                <svg viewBox="0 0 120 120" aria-hidden="true">

                    <circle class="punch-donut-track" cx="60" cy="60" r="52" fill="none" stroke-width="10" />

                    <circle

                        id="punchDonutProg"

                        class="punch-donut-ring"

                        cx="60"

                        cy="60"

                        r="52"

                        fill="none"

                        stroke-width="10"

                        stroke-dasharray="326.726"

                        stroke-dashoffset="0"

                        transform="rotate(-90 60 60)"

                    />

                </svg>

                <div class="punch-clock-center">

                    <div id="punchClockTime" class="punch-clock-time">—:—:—</div>

                    <div id="punchClockDate" class="punch-clock-date">—</div>

                </div>

            </div>

        </section>



        <section class="punch-feedback-zone punch-card-scan">

            <input

                type="text"

                id="punchWedgeInput"

                class="punch-scan-capture"

                tabindex="-1"

                autocomplete="off"

                autocorrect="off"

                autocapitalize="off"

                spellcheck="false"

                inputmode="none"

                aria-hidden="true"

            >

            <div id="punchFeedback" class="punch-feedback punch-feedback-placeholder" aria-live="polite"></div>

        </section>

    </main>

</div>



<!-- Camera + manual alternative entry -->

<div class="modal fade punch-alt-modal" id="punchAltModal" tabindex="-1" aria-labelledby="punchAltModalLabel" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable punch-alt-side-dialog">

        <div class="modal-content punch-modal-sheet punch-modal-sheet--compact">

                <div class="modal-header border-secondary-subtle punch-alt-modal-head py-2 px-3">

                <h5 class="modal-title fw-semibold mb-0" id="punchAltModalLabel">Camera &amp; manual</h5>

                <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="modal" aria-label="Close"></button>

            </div>

            <div class="modal-body punch-alt-modal-body">

                <div class="punch-modal-section mb-3">

                    <label class="form-label fw-semibold punch-modal-label small mb-2" for="punchManualId">Enter Gym ID</label>

                    <div class="input-group input-group-sm">

                        <input type="text" id="punchManualId" class="form-control punch-manual-input" placeholder="Gym ID" maxlength="128" autocomplete="off">

                        <button type="button" class="btn btn-warning px-3 fw-semibold btn-sm" id="btnPunchManual">Submit</button>

                    </div>

                </div>

                <hr class="border-secondary-subtle opacity-50 my-2">

                <div class="punch-modal-section">

                    <label class="form-label fw-semibold punch-modal-label small mb-2 d-block">Camera QR</label>

                    <div id="punchQrReader" class="punch-qr-host punch-alt-qr-host"></div>

                    <div class="punch-actions punch-alt-actions">

                        <button type="button" class="btn btn-warning btn-sm" id="btnPunchStartCam"><i class="fas fa-video me-1"></i>Start</button>

                        <button type="button" class="btn btn-outline-secondary btn-sm" id="btnPunchStopCam"><i class="fas fa-stop me-1"></i>Stop</button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script type="module" src="js/punch.js"></script>

</body>

</html>
